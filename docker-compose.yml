services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ticketmaster
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticketmaster"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./Ticketmaster
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ticketmaster
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build: ./ticketmaster-ui
    environment:
      VITE_API_PROXY_TARGET: http://backend:8081
    ports:
      - "5173:5173"
    volumes:
      - ./ticketmaster-ui/src:/app/src
      - ./ticketmaster-ui/index.html:/app/index.html
      - ./ticketmaster-ui/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend

volumes:
  postgres_data:
