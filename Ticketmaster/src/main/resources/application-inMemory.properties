# In-memory profile: no external database needed.
# All aggregates use the InMemory* HashMap repositories; JPA-only entities
# (Event, Notification) are persisted to an embedded H2 instance.
app.storage.mode=memory

spring.datasource.url=jdbc:h2:mem:ticketmaster;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR
