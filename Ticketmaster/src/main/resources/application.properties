spring.application.name=Ticketmaster

app.storage.mode=${STORAGE_MODE:memory}
app.external.mode=${EXTERNAL_MODE:fake}

server.port=8081

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Optional external "initial-state" file executed at startup (after the default
# admin is seeded) to bring the system to a defined state. Blank = disabled.
# Accepts Spring resource locations, e.g. classpath:initial-state.txt or
# file:/path/to/initial-state.txt. See initial-state.example.txt for the format.
app.init.state.file=${INIT_STATE_FILE:}
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR
