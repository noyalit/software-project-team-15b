spring.application.name=Ticketmaster

app.external.mode=${EXTERNAL_MODE:fake}

# Pick one of: inMemory, docker, cloudsql.
# The selected profile sets both the JPA datasource and `app.storage.mode`.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:inMemory}

server.port=8081

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR
