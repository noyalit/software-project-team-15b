spring.application.name=Ticketmaster

app.external.mode=${EXTERNAL_MODE:fake}

# Pick one of: inMemory, docker, cloudsql.
# The selected profile sets both the JPA datasource and `app.storage.mode`.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:inMemory}

server.port=${SERVER_PORT:8081}


spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR

ticketmaster.system-admin.username=${SYSTEM_ADMIN_USERNAME:}
ticketmaster.system-admin.password=${SYSTEM_ADMIN_PASSWORD:}

# External "initial-state" file executed at startup (after the default admin is
# seeded) to bring the system to a defined state. Opt-in: it runs ONLY when
# app.init.state.enabled is true (env INIT_RUN=true) — otherwise it is skipped,
# so ordinary restarts never re-run it. The file path accepts Spring resource
# locations, e.g. classpath:initial-state.txt or file:/path/to/initial-state.txt.
app.init.state.enabled=${INIT_RUN:false}
app.init.state.file=${INIT_STATE_FILE:classpath:initial-state.txt}
