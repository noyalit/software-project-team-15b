# Cloud SQL profile (Google Cloud, future).
# Pass the full JDBC URL — choose Cloud SQL Auth Proxy / socket factory /
# direct SSL externally; `validate` ddl-auto by default since migrations
# shouldn't run automatically against a managed cloud DB.
app.storage.mode=db

spring.datasource.url=${CLOUDSQL_JDBC_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${CLOUDSQL_USER}
spring.datasource.password=${CLOUDSQL_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${CLOUDSQL_DDL_AUTO:validate}
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=UUID
