# Docker profile: all aggregates persist to PostgreSQL.
# Pairs with the `postgres` service in docker-compose.yml at the repo root.
app.storage.mode=db

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ticketmaster}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${POSTGRES_DDL_AUTO:update}
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=UUID
