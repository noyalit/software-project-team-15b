# Application stack (backend + UI) — run this on the app machine (PC-B).
# The database runs separately on another machine via docker-compose.db.yml.
#
#   cp .env.app.example .env   # then set POSTGRES_HOST=<DB machine IP> + matching creds
#   docker compose -f docker-compose.app.yml up --build
#
# Open the UI at http://<this machine's IP>:5173.
services:
  backend:
    build: ./Ticketmaster
    environment:
      # Pinned: this stack always runs the db (docker) profile.
      SPRING_PROFILES_ACTIVE: docker
      # The DB lives on another machine — POSTGRES_HOST MUST be set in .env to that
      # machine's IP/hostname. Fail fast with a clear message if it's missing.
      POSTGRES_HOST: ${POSTGRES_HOST:?set POSTGRES_HOST to the DB machine IP/hostname}
      # Must match the DB machine's .env (docker-compose.db.yml).
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-ticketmaster}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      EXTERNAL_MODE: ${EXTERNAL_MODE:-fake}
      SERVER_PORT: ${SERVER_PORT:-8081}
      # Initial-state seeding is opt-in and runs against the remote DB. Seed a fresh
      # DB once with INIT_RUN=true (abort-on-failure, so re-seed only on a clean DB).
      INIT_RUN: ${INIT_RUN:-false}
      INIT_STATE_FILE: ${INIT_STATE_FILE:-classpath:initial-state.txt}
    volumes:
      # Mount the root .env read-only so the in-container config validator can lint the
      # raw file for typos. The effective config still comes from `environment:` above.
      - ./.env:/app/.env:ro
    ports:
      - "${BACKEND_PORT:-8081}:${SERVER_PORT:-8081}"
    # No depends_on: the database is on a different machine.

  ui:
    build: ./ticketmaster-ui
    environment:
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://backend:8081}
    ports:
      - "${UI_PORT:-5173}:5173"
    volumes:
      - ./ticketmaster-ui/src:/app/src
      - ./ticketmaster-ui/index.html:/app/index.html
      - ./ticketmaster-ui/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend
